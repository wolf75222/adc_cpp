# Environnement de developpement adc_cpp (conda / mamba, canal conda-forge).
#
# En UNE commande, conda fournit TOUT l'outillage -- une version recente de CMake, Ninja,
# l'interpreteur Python, NumPy, pybind11 -- ET les backends paralleles locaux (Kokkos,
# MPI, OpenMP), sans dependre des outils systeme, d'un venv pip ni de modules a charger :
#
#     conda env create -f environment.yml      # cree l'env "adc"
#     conda activate adc
#     # puis le build habituel (cf. README / docs/sphinx/getting_started/installation.md)
#
# Mettre a jour apres edition de ce fichier :
#     conda env update -f environment.yml --prune
#
# Cet env supprime les pieges de config recurrents :
#   - UN seul Python 3.12 (build ET import du module -> plus de "ModuleNotFoundError: adc._adc"
#     par divergence d'ABI cpython) ;
#   - pybind11 present -> pas de FetchContent reseau ni de warning de depreciation ;
#   - Kokkos / OpenMPI / libomp installes -> find_package(Kokkos|MPI|OpenMP) reussit une fois
#     l'env active (passer -DKokkos_ROOT=$CONDA_PREFIX au besoin, cf. doc d'installation).
#
# NOTE compilateur : ce fichier ne fournit PAS le compilateur C++ (pas de selecteurs par
# plateforme dans un environment.yml). `bash scripts/setup_env.sh` s'en charge : il cree cet
# env PUIS fige la meilleure toolchain par plateforme -- AppleClang sur macOS (CC/CXX poses
# dans l'env via `conda env config vars`, prioritaires sur le PATH ; un LLVM vanilla y est
# >15x plus lent sur les TU du module), cxx-compiler (gcc 14, C++23) sur Linux.
#
# PIEGE CONNU (bug reel) : certains envs conda/mambaforge exposent un `gcc`/`c++` VIEUX sur le
# PATH ; le DSL adc (backend "production") compilant des .so a l'execution, il pourrait le
# ramasser et echouer ("error: invalid value 'c++23' in '-std=c++23'"). Protections en place :
# le DSL prefere le compilateur qui a construit _adc (bake dans le module), `export ADC_CXX=...`
# l'emporte explicitement, et `python -c "import adc; adc.doctor()"` diagnostique l'ensemble.
#
# NOTE GPU / cluster : la validation GPU (Grace-Hopper) et le parallelisme lourd se font sur
# ROMEO via Spack/modules, PAS via conda. Les backends ci-dessous servent au dev LOCAL (CPU).
name: adc
channels:
  - conda-forge
dependencies:
  # --- Outillage de build (toujours) ---
  - python=3.12          # l'extension _adc est epinglee a l'ABI de CET interpreteur (cpython-312)
  - cmake>=3.27          # conda-forge sert une version recente (>= la 3.20 minimale du projet)
  - ninja                # generateur conseille (-G Ninja)
  - ccache               # cache de compilation (auto-detecte par CMake) : re-builds rapides

  # --- Module Python (toujours) ---
  - numpy>=1.24          # requis a l'IMPORT du module (python/adc/dsl.py fait `import numpy`)
  - pybind11>=2.13       # bindings. NB : le configure prefere TOUJOURS le pybind11 de l'interpreteur
                         # ACTIF (python -m pybind11 --cmakedir) -- potentiellement 3.x ; le repli
                         # FetchContent v2.13.6 n'est qu'un filet hors-env. bindings.cpp compile
                         # contre les deux (verifie avec 3.0.4).

  # --- Backends paralleles locaux (CPU) : ADC_USE_KOKKOS / ADC_USE_MPI / ADC_USE_OPENMP ---
  # ATTENTION (verifie sur le feedstock conda-forge, a reconfirmer a l'install) : le paquet
  # `kokkos` de conda-forge est typiquement compile avec le SEUL backend Serial (pas d'OpenMP ;
  # la variante CUDA est un paquet a part). Il suffit pour compiler/valider ADC_USE_KOKKOS=ON,
  # mais NE SCALE PAS en threads. Multi-thread reel EN UNE COMMANDE (Kokkos OpenMP compile DANS
  # l'env, ~2 min, outillage deja fourni par cet env) :
  #     bash scripts/kokkos_openmp_conda.sh
  # Verifier au configure : message "Kokkos found ... = (SERIAL[,OPENMP,...])".
  - kokkos               # backend de dispatch portable. find_package(Kokkos) ; cf. ATTENTION ci-dessus
  - openmpi              # backend MPI (seam comm distribue) ; fournit mpicxx/mpicc
  - llvm-openmp          # libomp + en-tetes : OpenMP autonome (deprecie) + runtime -fopenmp

  # --- Optionnels : decommenter selon le besoin ---
  # - "hdf5=*=mpi_openmpi_*"  # ADC_USE_HDF5=ON, DataWriter parallele (variante MPI, coherente avec openmpi)
  # - cxx-compiler            # toolchain C++ conda : clang 19 (osx-arm64) / gcc 14 (linux), tous deux
  #                           # C++23-capables. Recommande sur Linux/cluster sans gcc recent. Sur macOS,
  #                           # possible mais TOUT-CONDA alors : batir _adc avec lui ET export
  #                           # ADC_CXX=$CONDA_PREFIX/bin/clang++ (ne pas melanger avec AppleClang).
  # - sphinx>=7.0             # documentation (sinon docs/sphinx/requirements.txt via pip)
  # - furo
  # - myst-parser
