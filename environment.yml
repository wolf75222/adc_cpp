# PoPS development environment (conda / mamba, conda-forge channel).
#
# In ONE command, conda provides ALL the tooling -- a recent CMake, Ninja, the Python
# interpreter, NumPy, pybind11 -- AND the local parallel backends (Kokkos, MPI, OpenMP),
# without depending on system tools, a pip venv, or modules to load:
#
#     conda env create -f environment.yml      # creates the "pops" env
#     conda activate pops
#     # then the usual build (cf. README / docs/sphinx/getting-started/installation.md)
#
# Update after editing this file:
#     conda env update -f environment.yml --prune
#
# This env removes the recurring config traps:
#   - ONE single Python 3.12 (build AND import of the module -> no more "ModuleNotFoundError: pops._pops"
#     from a cpython ABI divergence);
#   - pybind11 present -> no network FetchContent nor deprecation warning;
#   - Kokkos / OpenMPI / libomp installed -> find_package(Kokkos|MPI|OpenMP) succeeds once the env is
#     active (pass -DKokkos_ROOT=$CONDA_PREFIX if needed, cf. the installation doc).
#
# COMPILER NOTE: this file does NOT provide the C++ compiler (no per-platform selectors in an
# environment.yml). `bash scripts/setup_env.sh` handles it: it creates this env THEN pins the best
# toolchain per platform -- AppleClang on macOS (CC/CXX set in the env via `conda env config vars`,
# taking priority over the PATH; a vanilla LLVM there is >15x slower on the module's translation units),
# cxx-compiler (gcc 14.2 via cxx-compiler 1.11.0, C++23) on Linux.
#
# KOKKOS CPU/CUDA TRAP (real bug, Ubuntu): the bare `kokkos` below resolves to the CUDA variant
# whenever conda detects a `__cuda` virtual package (NVIDIA driver present). On a CPU host this drags in
# cuda-cudart and a CUDA Kokkos, then `pip install .` (Kokkos is ON and mandatory, find_package picks the
# conda Kokkos) fails with "Could not find nvcc". `bash scripts/setup_env.sh` creates the env under
# `CONDA_OVERRIDE_CUDA=""`, which forces conda to pick the CPU Kokkos builds (no fragile build-string
# pin); pass `--cuda` to opt into the CUDA variant. Manual equivalent on a CPU host:
#     CONDA_OVERRIDE_CUDA="" conda env create -f environment.yml
#
# KNOWN COMPILER TRAP (real bug): some conda/mambaforge envs expose an OLD `gcc`/`c++` on the PATH;
# the adc DSL (backend "production") compiling .so at runtime could pick it up and fail
# ("error: invalid value 'c++23' in '-std=c++23'"). Protections in place: the DSL prefers the compiler
# that built _pops (baked into the module), `export POPS_CXX=...` wins explicitly, and
# `python -c "import adc; pops.doctor()"` diagnoses the whole chain.
#
# GPU / cluster NOTE: GPU validation (Grace-Hopper) and heavy parallelism run on ROMEO via Spack/modules,
# NOT via conda. The backends below serve LOCAL (CPU) development.
name: pops
channels:
  - conda-forge
dependencies:
  # --- Build tooling (always) ---
  - python=3.12          # the _pops extension is pinned to the ABI of THIS interpreter (cpython-312)
  - cmake>=3.27          # conda-forge ships a recent version (>= the project's minimum 3.20)
  - ninja                # recommended generator (-G Ninja)
  - ccache               # compilation cache (auto-detected by CMake): fast re-builds
  - scikit-build-core>=0.10  # wheel build backend (pyproject.toml). Present IN the env so
                         # `pip install . --no-build-isolation` (cf. scripts/build_python.sh) reuses the
                         # pinned stack instead of a fresh, unpinned pip build venv.

  # --- Python module (always) ---
  - numpy>=1.24          # required at the module IMPORT (python/pops/dsl.py does `import numpy`)
  - pybind11>=2.13,<3    # bindings. ADC-338: pinned to the 2.x line (the conservative/validated stack);
                         # bindings.cpp also compiles against 3.x (verified with 3.0.4), so drop the
                         # `<3` if you want conda-forge's 3.x. The configure ALWAYS prefers the pybind11
                         # of the ACTIVE interpreter (python -m pybind11 --cmakedir); the FetchContent
                         # fallback v2.13.6 is only an out-of-env safety net.

  # --- Local parallel backends (CPU): POPS_USE_KOKKOS / POPS_USE_MPI / POPS_USE_OPENMP ---
  # NOTE (verified on the conda-forge feedstock, reconfirm at install time): the conda-forge `kokkos`
  # package is typically built with the Serial backend ONLY (no OpenMP; the CUDA variant is a separate
  # package, see the KOKKOS CPU/CUDA TRAP above). Serial is enough to compile/validate POPS_USE_KOKKOS=ON
  # but DOES NOT scale across threads. Real multi-threading IN ONE COMMAND (Kokkos OpenMP compiled IN the
  # env, ~2 min, tooling already provided by this env):
  #     bash scripts/kokkos_openmp_conda.sh
  # Check at configure: message "Kokkos found ... = (SERIAL[,OPENMP,...])".
  - kokkos               # portable dispatch backend (Serial CPU, find_package(Kokkos); cf. the NOTE above).
                         # ADC-338 local-vs-validated gap (documented, NOT hard-pinned): CI/ROMEO validate
                         # against a SOURCE-built Kokkos 4.4.01 (`.github/actions/setup-kokkos`, nvcc on
                         # GH200) -- a different artifact from this conda CPU-dev package, whose default
                         # is per-platform (verified dry-run: osx-arm64 ~4.7.01, linux-64 ~4.3.00). They
                         # serve different roles (local compile/validate
                         # vs the GPU run), so pinning conda to 4.4.01 buys no runtime parity and would
                         # downgrade working envs. Pin here (e.g. `kokkos=4.4.*`) only if you deliberately
                         # want local==CI Kokkos and have confirmed conda-forge still ships that build.
  - openmpi              # MPI backend (distributed comm seam); provides mpicxx/mpicc
  - llvm-openmp          # libomp + headers: standalone OpenMP (deprecated) + -fopenmp runtime

  # --- Optional: uncomment as needed ---
  # - "hdf5=*=mpi_openmpi_*"  # POPS_USE_HDF5=ON, parallel DataWriter (MPI variant, consistent with openmpi)
  # - cxx-compiler            # conda C++ toolchain: clang (osx-arm64) / gcc 14.2 (linux), both
  #                           # C++23-capable. Recommended on Linux/cluster without a recent gcc. On macOS,
  #                           # possible but ALL-CONDA then: build _pops with it AND export
  #                           # POPS_CXX=$CONDA_PREFIX/bin/clang++ (do not mix with AppleClang).
  # - sphinx>=7.0             # documentation (otherwise docs/sphinx/requirements.txt via pip)
  # - furo
  # - myst-parser
