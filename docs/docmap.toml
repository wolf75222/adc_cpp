# docmap.toml -- carte anti-rot de la documentation adc_cpp.
#
# Format TOML (parse par tomllib, stdlib Python 3.11+ ; aucune dependance externe). Les issues
# Linear parlaient d'un .yml ; la contrainte "stdlib sans dependance" prime, d'ou le TOML.
#
# A quoi ca sert
# --------------
# docs/check_docs.py lit ce fichier pour :
#   - PRESENCE : toute page docs/sphinx/**.md (hors [exclude]) doit avoir une entree ici, et tout
#     chemin depends_on / tested_by doit exister sur le disque (anti-rot de la carte elle-meme) ;
#   - FRAICHEUR : si un fichier de depends_on a ete commite APRES la derniere relecture du doc
#     (champ reviewed, sinon dernier commit touchant le doc), le doc est suspect. mode strict =>
#     violation (exit 1) ; mode warning => avertissement non bloquant.
# docs/run_doc_examples.py lit tested_by pour rejouer les scripts d'exemple (--quick).
#
# Champs d'une entree [docs."<chemin repo-relatif>"]
# --------------------------------------------------
#   owner       proprietaire humain du doc.
#   mode        "strict" (fraicheur bloquante) ou "warning" (fraicheur informative).
#   depends_on  fichiers/dossiers du code dont le doc decrit le comportement ; un commit sur l'un
#               d'eux rend le doc suspect tant qu'il n'est pas relu/acquitte.
#   tested_by   scripts d'exemple (acceptant --quick --outdir) qui executent le doc de bout en bout.
#   testable    true si les blocs de code porteurs du doc doivent venir d'un literalinclude.
#   reviewed    optionnel : sha acquittant la fraicheur ("relu a jour a ce commit"). A l'echelle de
#               cette carte, toutes les entrees avec depends_on sont baselinees sur origin/master au
#               moment de la PR (71f02e7) ; un futur commit touchant un depends_on les reactivera.
#               Exception : les trois pages dependant de CMakeLists.txt (installation, organisation,
#               windows_native) sont re-baselinees sur le commit de cette PR qui ajoute la cible
#               'docs' a CMakeLists.txt. Cette cible est un raccourci de confort hors ALL (equivalent
#               a `bash scripts/build_docs.sh`), sans effet sur le contenu de ces pages ; les relire
#               apres le touch revient donc a acquitter la fraicheur sur ce commit.

[exclude]
patterns = ["_generated/**", "tutorials/_assets*/**", "doxygen/**", "__pycache__/**"]


