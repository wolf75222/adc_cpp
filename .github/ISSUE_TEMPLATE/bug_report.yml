name: Bug report
description: Report a defect in the adc_cpp core, the Python bindings or the DSL path.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Tasks are tracked in Linear; this form is for external bug reports, which are then
        triaged into Linear. For a security vulnerability, do not open an issue: use private
        reporting (see SECURITY.md).
  - type: textarea
    id: what
    attributes:
      label: What happens
      description: Clear description of the defect, expected versus observed.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: The smallest case, script or command that triggers it.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: adc.__version__, or the git tag / commit.
    validations:
      required: true
  - type: dropdown
    id: backend
    attributes:
      label: On-node backend
      options:
        - Kokkos Serial
        - Kokkos OpenMP
        - Kokkos Cuda (GPU)
    validations:
      required: true
  - type: dropdown
    id: mpi
    attributes:
      label: MPI
      options:
        - "off"
        - "on"
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform and compiler
      description: e.g. macOS 14 AppleClang 16, Linux GCC 14, ROMEO GH200 nvcc.
    validations:
      required: true
  - type: textarea
    id: build
    attributes:
      label: Build and run
      description: The preset(s) and command(s) used.
      render: shell
  - type: textarea
    id: logs
    attributes:
      label: Logs / trace
      render: shell
