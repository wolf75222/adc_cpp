name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'tutorials/**'
      - '.gitignore'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'tutorials/**'
      - '.gitignore'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ubuntu-latest / Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libeigen3-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        # Cap les jobs paralleles : les instanciations de templates AMR + Eigen
        # dans les TU les plus lourdes (test_amr_*) peuvent prendre ~1-2 GB RAM ;
        # avec -j illimite le runner github (~7 GB) se fait tuer (exit 143).
        run: cmake --build build --config Release -j 2

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build + test Python module `adc`
        # Les bindings de la lib (module `adc` : System + facades) vivent ICI. On construit
        # l'extension _adc et on exerce test_bindings.py (composition, Poisson, integrateur Python)
        # et la suite du mini-DSL symbolique : test_dsl (interprete CPU), test_dsl_codegen (codegen
        # fonction flux), test_dsl_brick (brique satisfaisant HyperbolicModel == Euler/ExB),
        # test_dsl_source (source == PotentialForce), test_dsl_compose (CompositeModel genere ==
        # ecrit main), test_dsl_jit (formules -> .hpp -> g++ -> residu Rusanov identique a Euler),
        # test_dsl_coupled (euler_poisson JIT = bloc COUPLE : elliptic_rhs cable au Poisson + source),
        # test_dsl_roles (la brique generee declare ses VariableRole ; index_of(role) resout par sens).
        run: |
          pip install --upgrade pip numpy
          cmake -B build-py -DCMAKE_BUILD_TYPE=Release -DADC_BUILD_PYTHON=ON -DADC_USE_EIGEN=OFF
          cmake --build build-py --target _adc -j 2
          PYTHONPATH=$PWD/build-py/python python3 python/tests/test_bindings.py
          PYTHONPATH=$PWD/build-py/python python3 python/tests/test_dsl.py
          PYTHONPATH=$PWD/build-py/python python3 python/tests/test_dsl_codegen.py
          PYTHONPATH=$PWD/build-py/python python3 python/tests/test_dsl_brick.py
          PYTHONPATH=$PWD/build-py/python python3 python/tests/test_dsl_source.py
          PYTHONPATH=$PWD/build-py/python python3 python/tests/test_dsl_compose.py
          PYTHONPATH=$PWD/build-py/python python3 python/tests/test_dsl_jit.py
          PYTHONPATH=$PWD/build-py/python python3 python/tests/test_dsl_elliptic.py
          PYTHONPATH=$PWD/build-py/python python3 python/tests/test_dsl_cse.py
          PYTHONPATH=$PWD/build-py/python python3 python/tests/test_dsl_jitlib.py
          PYTHONPATH=$PWD/build-py/python python3 python/tests/test_dsl_dynamic.py
          PYTHONPATH=$PWD/build-py/python python3 python/tests/test_dsl_block.py
          PYTHONPATH=$PWD/build-py/python python3 python/tests/test_dsl_coupled.py
          PYTHONPATH=$PWD/build-py/python python3 python/tests/test_dsl_aot.py
          PYTHONPATH=$PWD/build-py/python python3 python/tests/test_dsl_recon.py
          PYTHONPATH=$PWD/build-py/python python3 python/tests/test_poisson_eps.py
          PYTHONPATH=$PWD/build-py/python python3 python/tests/test_magnetic_field.py
          PYTHONPATH=$PWD/build-py/python python3 python/tests/test_dsl_aux_naux.py
          PYTHONPATH=$PWD/build-py/python python3 python/tests/test_dsl_jit_bz.py
          PYTHONPATH=$PWD/build-py/python python3 python/tests/test_dsl_roles.py

  mpi:
    name: ubuntu-latest / MPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libeigen3-dev libopenmpi-dev openmpi-bin

      - name: Configure + build (MPI)
        run: |
          cmake -B build-mpi -DCMAKE_BUILD_TYPE=Release -DADC_USE_MPI=ON
          cmake --build build-mpi --config Release -j 2

      - name: Test (bit-identique np=1/2/4)
        # Les runners n'ont que 2-4 slots ; mpirun -np 4 a besoin d'oversubscribe.
        # OMPI_MCA_* couvre OpenMPI 4.x, PRTE_MCA_* couvre OpenMPI 5.x.
        env:
          OMPI_MCA_rmaps_base_oversubscribe: "true"
          PRTE_MCA_rmaps_default_mapping_policy: ":oversubscribe"
        run: ctest --test-dir build-mpi --output-on-failure -C Release

  kokkos:
    name: ubuntu-latest / Kokkos (Serial)
    runs-on: ubuntu-latest
    # Teste le backend KOKKOS sur CPU (Serial). Indispensable : le build SANS Kokkos (job Release)
    # ne couvre PAS le chemin kokkos_malloc / for_each Kokkos. C'est ce trou qui avait laisse passer
    # la regression d'init (allocation d'un Fab avant l'init paresseuse de Kokkos).
    steps:
      - uses: actions/checkout@v5

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libeigen3-dev

      - name: Build + install Kokkos (Serial)
        run: |
          git clone --depth 1 -b 4.4.01 https://github.com/kokkos/kokkos.git /tmp/kokkos
          cmake -S /tmp/kokkos -B /tmp/kbuild -DKokkos_ENABLE_SERIAL=ON \
            -DCMAKE_INSTALL_PREFIX=/tmp/kinstall -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_STANDARD=20
          cmake --build /tmp/kbuild -j 2 --target install

      - name: Configure + build (backend Kokkos)
        run: |
          cmake -B build-kokkos -DCMAKE_BUILD_TYPE=Release -DADC_USE_KOKKOS=ON -DKokkos_ROOT=/tmp/kinstall
          cmake --build build-kokkos --config Release -j 2

      - name: Test (ctest, backend Kokkos Serial)
        run: ctest --test-dir build-kokkos --output-on-failure -C Release
