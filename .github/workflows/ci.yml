name: CI

# adc_cpp est KOKKOS-ONLY : Kokkos est le seul backend on-node (Serial / OpenMP / Cuda selon
# l'install Kokkos). Il n'existe plus de build non-Kokkos -- TOUS les jobs configurent avec
# -DADC_USE_KOKKOS=ON. La matrice :
#  - build-and-test (sur pull_request, gate OBLIGATOIRE) : Kokkos SERIAL, ctest C++ + module
#    Python + tests Python. Rapide grace aux caches (Kokkos installe + ccache + pip).
#  - ci-full (push master, nightly cron, workflow_dispatch, ou PR portant le label `ci-full`) :
#    ajoute MPI (+ Kokkos Serial) et Kokkos OpenMP, la suite COMPLETE.
# Aucun test n'est supprime : seuls les declencheurs et le cache changent. Le serie passe par
# Kokkos Serial (Kokkos_ENABLE_SERIAL=ON), le multi-thread par Kokkos OpenMP (Kokkos_ENABLE_OPENMP).
on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'tutorials/**'
      - '.gitignore'
  pull_request:
    # Types par defaut (opened, synchronize, reopened) PLUS labeled : poser le label
    # `ci-full` sur une PR re-declenche le workflow, et set-mode bascule alors en plein
    # (MPI + Kokkos OpenMP). Sans `labeled`, ajouter un label ne relance aucun run.
    types: [opened, synchronize, reopened, labeled]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'tutorials/**'
      - '.gitignore'
  schedule:
    # Suite complete chaque nuit (03:17 UTC) meme sans push, pour attraper toute
    # derive d'environnement (image runner, deps apt) hors du chemin critique des PR.
    - cron: '17 3 * * *'
  workflow_dispatch:

concurrency:
  # Sur une PR, un nouveau push annule le run precedent encore en vol : on n'immobilise
  # pas les runners lents sur une revision deja perimee.
  # Sur un push master (et nightly/dispatch), on n'annule PAS : des merges rapproches se
  # couperaient mutuellement leurs builds Kokkos lents (interruption SIGTERM, exit 143),
  # marquant master en faux rouge alors que le code est sain. Chaque validation post-merge
  # va donc a son terme (les runs se mettent en file au lieu de s'annuler).
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Calcule si la suite COMPLETE (MPI + Kokkos OpenMP) doit tourner. Plein si :
  #  - push sur master, OU
  #  - run nocturne (schedule), OU
  #  - declenchement manuel (workflow_dispatch), OU
  #  - PR portant le label `ci-full` (l'integrateur exige la validation MPI/Kokkos OpenMP
  #    sur une PR a risque avant merge).
  # Sinon (PR ordinaire) : gate rapide seul (Kokkos Serial : C++ + Python).
  set-mode:
    name: mode (fast/full)
    runs-on: ubuntu-latest
    outputs:
      full: ${{ steps.decide.outputs.full }}
    steps:
      - id: decide
        run: |
          full=false
          if [ "${{ github.event_name }}" = "push" ] \
             || [ "${{ github.event_name }}" = "schedule" ] \
             || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            full=true
          fi
          if [ "${{ github.event_name }}" = "pull_request" ] \
             && [ "${{ contains(github.event.pull_request.labels.*.name, 'ci-full') }}" = "true" ]; then
            full=true
          fi
          echo "full=$full" >> "$GITHUB_OUTPUT"
          echo "Mode plein (MPI + Kokkos OpenMP) : $full (event=${{ github.event_name }})"

  build-and-test:
    name: ubuntu-latest / Kokkos Serial (C++ + Python)
    runs-on: ubuntu-latest
    # Pas de `needs: set-mode` : ce gate Kokkos Serial tourne dans TOUS les modes (fast comme
    # full), donc il demarre tout de suite, en parallele du calcul de mode. Seuls mpi et
    # kokkos-openmp dependent de set-mode (ils ne tournent qu'en plein).

    env:
      # ccache borne : evite que le cache enfle sans fin entre les runs.
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 2G
      # Prefixe FIXE ou Kokkos est installe ; mis en cache (le gros gain : pas de
      # reconstruction de Kokkos a chaque run). Version EXACTE : 4.4.01, Serial, PIC
      # (la PIC est exigee pour lier le module Python _adc).
      KOKKOS_VERSION: 4.4.01
      KOKKOS_PREFIX: ${{ github.workspace }}/.kokkos-install

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libeigen3-dev ninja-build ccache

      # Cache du Kokkos DEJA INSTALLE (Serial, PIC), cle sur la version exacte + compilateur.
      # Sur hit, on saute entierement la reconstruction de Kokkos (le gros poste de temps).
      - name: Cache Kokkos install (Serial ${{ env.KOKKOS_VERSION }})
        id: kokkos-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.KOKKOS_PREFIX }}
          key: kokkos-${{ runner.os }}-${{ env.KOKKOS_VERSION }}-serial-cxx20-gcc-pic

      - name: Build + install Kokkos (Serial, PIC)
        # Reconstruit Kokkos UNIQUEMENT sur cache miss ; sinon on reutilise le prefixe en cache.
        # PIC : le module Python _adc (extension partagee) lie Kokkos, donc le code Kokkos doit
        # etre position-independent.
        if: steps.kokkos-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 -b ${KOKKOS_VERSION} https://github.com/kokkos/kokkos.git /tmp/kokkos
          cmake -S /tmp/kokkos -B /tmp/kbuild -G Ninja -DKokkos_ENABLE_SERIAL=ON \
            -DCMAKE_INSTALL_PREFIX="${KOKKOS_PREFIX}" -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=20 -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build /tmp/kbuild --parallel 4 --target install

      # ccache : cle la plus specifique (os+job+ref+sha) en ecriture, restore-keys
      # du plus precis au plus large (meme job sur la branche -> sur master -> n'importe).
      - name: Cache ccache (Kokkos Serial)
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-kokkos-serial-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-kokkos-serial-${{ github.ref }}-
            ccache-${{ runner.os }}-kokkos-serial-refs/heads/master-
            ccache-${{ runner.os }}-kokkos-serial-

      # Flags du build : CMakePresets.json (preset ci-kokkos) = SOURCE UNIQUE DE VERITE, partagee
      # avec le dev local ; Kokkos_ROOT vient de $KOKKOS_PREFIX (install en cache ci-dessus) et
      # ccache est auto-detecte par le CMakeLists (ADC_USE_CCACHE). Le preset pose aussi
      # ADC_TESTS_FAST_O0=ON : sous Kokkos, l'inlining -O3 des foncteurs device dans les ~242
      # cibles de test rendait le build du gate enorme. Les tests sont des controles de correction
      # sur grilles minuscules -> compiles a -O0 (build rapide, RAM bornee ; la lib de production
      # et _adc restent a -O3) ; le pool Ninja adc_heavy_tu=1 serialise en plus les TU system.cpp
      # (cf. tests/CMakeLists.txt). Parallelisme borne (jobs: 2) dans les build/testPresets.
      - name: Configure (backend Kokkos Serial)
        run: cmake --preset ci-kokkos

      - name: Build
        run: cmake --build --preset ci-kokkos

      - name: Test
        run: ctest --preset ci-kokkos

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Cache ccache (Python module)
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.ccache-py
          key: ccache-${{ runner.os }}-python-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-python-${{ github.ref }}-
            ccache-${{ runner.os }}-python-refs/heads/master-
            ccache-${{ runner.os }}-python-

      - name: Build + test Python module `adc` (backend Kokkos Serial)
        # Les bindings de la lib (module `adc` : System + facades) vivent ICI. On construit
        # l'extension _adc AVEC Kokkos puis on exerce TOUTE la suite python/tests/test_*.py par
        # AUTO-DECOUVERTE (find ... | xargs -P 2) : la liste ne peut plus se perimer et un
        # nouveau test livre par une PR soeur est pris automatiquement.
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache-py
          CCACHE_MAXSIZE: 2G
        run: |
          pip install --upgrade pip numpy
          cmake --preset ci-kokkos-python
          cmake --build --preset ci-kokkos-python
          export PYTHONPATH="$PWD/build-kokkos-py/python"
          # adc_cpp est Kokkos-only : les tests DSL qui compilent un loader/.so (aot, production, ABI)
          # incluent les en-tetes adc (-> for_each, #error sans Kokkos). Ils lisent le Kokkos a utiliser
          # via Kokkos_ROOT / ADC_KOKKOS_ROOT : on pointe le MEME Kokkos Serial que le module _adc.
          export Kokkos_ROOT="${KOKKOS_PREFIX}" ADC_KOKKOS_ROOT="${KOKKOS_PREFIX}"
          find python/tests -maxdepth 1 -name 'test_*.py' -print0 | sort -z \
            | xargs -0 -P 2 -I {} bash -c 'echo "::group::{}"; python3 "{}"; echo "::endgroup::"'

      - name: ccache stats (Kokkos Serial)
        if: always()
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
        run: ccache -s

      - name: ccache stats (Python module)
        if: always()
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache-py
        run: ccache -s

  mpi:
    name: ubuntu-latest / MPI + Kokkos Serial
    runs-on: ubuntu-latest
    needs: set-mode
    # Suite complete uniquement (push master / nightly / dispatch / PR label `ci-full`).
    if: needs.set-mode.outputs.full == 'true'

    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 2G
      KOKKOS_VERSION: 4.4.01
      KOKKOS_PREFIX: ${{ github.workspace }}/.kokkos-install

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libeigen3-dev libopenmpi-dev openmpi-bin ninja-build ccache

      # Meme install Kokkos Serial (PIC) que le gate ; cle de cache partagee.
      - name: Cache Kokkos install (Serial ${{ env.KOKKOS_VERSION }})
        id: kokkos-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.KOKKOS_PREFIX }}
          key: kokkos-${{ runner.os }}-${{ env.KOKKOS_VERSION }}-serial-cxx20-gcc-pic

      - name: Build + install Kokkos (Serial, PIC)
        if: steps.kokkos-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 -b ${KOKKOS_VERSION} https://github.com/kokkos/kokkos.git /tmp/kokkos
          cmake -S /tmp/kokkos -B /tmp/kbuild -G Ninja -DKokkos_ENABLE_SERIAL=ON \
            -DCMAKE_INSTALL_PREFIX="${KOKKOS_PREFIX}" -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=20 -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build /tmp/kbuild --parallel 4 --target install

      - name: Cache ccache (MPI)
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-mpi-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-mpi-${{ github.ref }}-
            ccache-${{ runner.os }}-mpi-refs/heads/master-
            ccache-${{ runner.os }}-mpi-

      - name: Configure + build (MPI + Kokkos Serial)
        # Flags : preset ci-mpi (source unique, cf. CMakePresets.json) ; Kokkos_ROOT vient de
        # $KOKKOS_PREFIX (env du job, install en cache). ccache auto-detecte.
        run: |
          cmake --preset ci-mpi
          cmake --build --preset ci-mpi

      - name: Test (bit-identique np=1/2/4)
        # Les runners n'ont que 2-4 slots ; mpirun -np 4 a besoin d'oversubscribe.
        # OMPI_MCA_* couvre OpenMPI 4.x, PRTE_MCA_* couvre OpenMPI 5.x.
        env:
          OMPI_MCA_rmaps_base_oversubscribe: "true"
          PRTE_MCA_rmaps_default_mapping_policy: ":oversubscribe"
        run: ctest --preset ci-mpi

      - name: ccache stats (MPI)
        if: always()
        run: ccache -s

  kokkos-openmp:
    name: ubuntu-latest / Kokkos (OpenMP)
    runs-on: ubuntu-latest
    needs: set-mode
    # Teste le backend KOKKOS avec l'espace d'execution OpenMP (CPU multi-thread). Le gate
    # build-and-test couvre deja Kokkos Serial (mono-thread) ; ce job ferme le multi-thread.
    # Suite complete uniquement (push master / nightly / dispatch / PR label `ci-full`).
    if: needs.set-mode.outputs.full == 'true'

    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 2G
      # Prefixe SEPARE du Kokkos Serial pour eviter toute collision de cache.
      # Meme version de Kokkos, espace d'execution OpenMP.
      KOKKOS_VERSION: 4.4.01
      KOKKOS_PREFIX: ${{ github.workspace }}/.kokkos-openmp-install

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libeigen3-dev ninja-build ccache

      # Cache du Kokkos DEJA INSTALLE, cle sur la version exacte + openmp + compilateur.
      # La cle inclut "openmp" pour ne pas entrer en collision avec le cache serial.
      - name: Cache Kokkos install (OpenMP ${{ env.KOKKOS_VERSION }})
        id: kokkos-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.KOKKOS_PREFIX }}
          key: kokkos-${{ runner.os }}-${{ env.KOKKOS_VERSION }}-openmp-cxx20-gcc-pic

      - name: Cache ccache (Kokkos OpenMP)
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-kokkos-openmp-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-kokkos-openmp-${{ github.ref }}-
            ccache-${{ runner.os }}-kokkos-openmp-refs/heads/master-
            ccache-${{ runner.os }}-kokkos-openmp-

      - name: Build + install Kokkos (OpenMP)
        # Reconstruit Kokkos UNIQUEMENT sur cache miss.
        # Kokkos_ENABLE_OPENMP=ON : l'exec space par defaut devient OpenMP.
        if: steps.kokkos-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 -b ${KOKKOS_VERSION} https://github.com/kokkos/kokkos.git /tmp/kokkos-omp
          cmake -S /tmp/kokkos-omp -B /tmp/kbuild-omp -G Ninja -DKokkos_ENABLE_OPENMP=ON \
            -DCMAKE_INSTALL_PREFIX="${KOKKOS_PREFIX}" -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=20 -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build /tmp/kbuild-omp --parallel 4 --target install

      - name: Configure + build (backend Kokkos OpenMP)
        # MEME preset ci-kokkos que le job Serial (binaryDir build-kokkos) : seule l'install
        # Kokkos pointee par $KOKKOS_PREFIX differe ; les runners sont des machines distinctes.
        run: |
          cmake --preset ci-kokkos
          cmake --build --preset ci-kokkos

      - name: Test (ctest, backend Kokkos OpenMP)
        # OMP_NUM_THREADS=2 : le runner GitHub est petit (2 vCPU) ; sans borne,
        # Kokkos detecte le nombre de coeurs logiques et lance N threads qui se
        # battent, ce qui provoque des suites-tests lentes ou tues (OOM/timeout).
        # OMP_PROC_BIND=false : les runners GitHub ne permettent pas l'affinite
        # de threads (KMP_AFFINITY=disabled equivalent) ; sans ce flag, OpenMP peut
        # echouer avec "Cannot bind threads" sur certaines images runner.
        env:
          OMP_NUM_THREADS: "2"
          OMP_PROC_BIND: "false"
        run: ctest --preset ci-kokkos

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      # GARDE-FOU ABI std (regression GH200). Sous Kokkos le module _adc est compile en C++20
      # (ADC_CXX_STD=20, CUDA 12.x sans -std=c++23) tandis que le DSL backend="production" figeait
      # le std du modele natif a c++23 -> cles d'ABI divergentes -> add_native_block rejetait tout
      # bloc natif. Aucun job CI ne couvrait ce chemin (le modele production est compile au RUNTIME,
      # pas en CI). On construit donc ICI le module Python AVEC Kokkos (loader c++20) puis on exerce
      # les tests qui compilent un modele production et appellent add_native_block : ils echoueraient
      # avec l'ancien defaut c++23, ils passent avec le std aligne sur le loader.
      - name: Build module Python `adc` (backend Kokkos OpenMP)
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
          CCACHE_MAXSIZE: 2G
        run: |
          pip install --upgrade pip numpy
          cmake --preset ci-kokkos-python
          cmake --build --preset ci-kokkos-python

      - name: Test ABI natif (production -> add_native_block, std aligne sur le loader c++20)
        env:
          OMP_NUM_THREADS: "2"
          OMP_PROC_BIND: "false"
          # PARITE KOKKOS du loader runtime : le module _adc est compile AVEC Kokkos ; sans cette
          # variable, dsl.py compile le loader SANS -DADC_HAS_KOKKOS -> cle d'ABI kokkos=0 vs
          # kokkos=1 du module -> rejet explicite (jeton ajoute expres : cette divergence etait
          # auparavant un fallback serie MUET). Le step suit desormais la regle documentee partout :
          # exporter ADC_KOKKOS_ROOT = la racine Kokkos du build.
          ADC_KOKKOS_ROOT: ${{ env.KOKKOS_PREFIX }}
        run: |
          export PYTHONPATH="$PWD/build-kokkos-py/python"
          # Kokkos-only : ces tests compilent un loader/.so qui inclut les en-tetes adc (-> for_each).
          # Ils lisent le Kokkos via Kokkos_ROOT / ADC_KOKKOS_ROOT : MEME install Kokkos OpenMP que _adc.
          export Kokkos_ROOT="${KOKKOS_PREFIX}" ADC_KOKKOS_ROOT="${KOKKOS_PREFIX}"
          # Le test cle de regression + les suites production qui compilent un modele au runtime et
          # le branchent par add_native_block (System et AMR). Sous Kokkos, loader = c++20.
          # Le teardown est redevenu STRICT : le SIGABRT post-succes de test_dsl_production_amr
          # (issue #271, arenes statiques des loaders detruites avant les finalize hooks Kokkos)
          # est corrige a la racine (ManagedArena = singleton jamais detruit, allocator.hpp) --
          # la tolerance ciblee rc=134 est retiree, tout echec redevient fatal.
          for t in test_native_abi_std test_dsl_production test_dsl_production_amr; do
            echo "::group::$t"
            python3 "python/tests/$t.py"
            echo "::endgroup::"
          done

      - name: ccache stats (Kokkos OpenMP)
        if: always()
        run: ccache -s

  bench-compile:
    name: ubuntu-latest / bench (compile seul)
    runs-on: ubuntu-latest
    needs: set-mode
    # COMPILE-TEST du harnais bench/ (jamais execute : sortie chronometree non deterministe).
    # bench/ n'est configure par aucun autre job : sans cette etape, un changement de signature
    # dans le coeur ou dans python/amr_system.cpp (que scaling_amr recompile) peut le casser
    # sans detection jusqu'au prochain ADC_BUILD_BENCH=ON manuel. Suite complete uniquement.
    if: needs.set-mode.outputs.full == 'true'

    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 500M

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libeigen3-dev ninja-build ccache

      - name: Cache ccache (bench)
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-bench-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-bench-${{ github.ref }}-
            ccache-${{ runner.os }}-bench-refs/heads/master-
            ccache-${{ runner.os }}-bench-

      - name: Configure + build (bench, compile seulement)
        run: |
          cmake --preset ci-bench
          cmake --build --preset ci-bench

      - name: ccache stats (bench)
        if: always()
        run: ccache -s
