name: Quality

# Analyse statique / qualite de code, VOLONTAIREMENT hors du chemin critique des PR : ce workflow
# ne tourne JAMAIS sur un push ni sur une PR ordinaire (c'est ci.yml qui garde les PR). Il agrege
# huit familles d'outils :
#   - format       : clang-format --dry-run (.clang-format) [BLOQUANT] + ruff (lint python/) [info]
#   - warnings     : build avec -Wall -Wextra -Wpedantic ... (ADC_ENABLE_WARNINGS)    [non bloquant]
#   - tidy         : run-clang-tidy sur les TU de tests/ (.clang-tidy)                 [non bloquant]
#   - sanitizers   : ctest sous ASan + UBSan (ADC_ENABLE_SANITIZERS, preset ci-asan)  [non bloquant]
#   - tsan         : ctest sous TSan, backend OpenMP (ADC_ENABLE_TSAN, preset ci-tsan)[non bloquant]
#   - fuzz         : harnais libFuzzer 90 s/cible (ADC_BUILD_FUZZING, preset ci-fuzz) [BLOQUANT]
#   - coverage     : ctest instrumente gcov + rapport gcovr (ADC_ENABLE_COVERAGE)     [non bloquant]
#   - codeql       : code scanning C++ GitHub (repo public = gratuit)                 [-> onglet Security]
#
# DECLENCHEURS :
#   - schedule : une fois par semaine (dimanche 04:00 UTC, decale du nightly ci-full a 03:17) ;
#   - workflow_dispatch : a la demande ;
#   - pull_request (labeled) FILTRE sur le label `quality` : poser le label `quality` sur une PR a
#     risque lance la passe complete sur cette PR (opt-in ; cf. job set-mode).
# POLITIQUE : informatif d'abord. Aucune option CMake n'est ON par defaut ; la plupart des jobs ne
# cassent PAS le run sur un finding (pas de -Werror) -> on observe l'etat reel, on durcit ensuite.
# EXCEPTIONS deja actees au "non bloquant" :
#   - fuzz est BLOQUANT (bascule ADC-120 : un crash libFuzzer = vrai bug reproductible) ;
#   - le check clang-format du job format est BLOQUANT (bascule ADC-219 : le tronc est conforme au
#     style depuis le balayage ADC-118, tout nouvel ecart = regression). ruff (python/) reste informatif.
on:
  schedule:
    - cron: '0 4 * * 0'
  workflow_dispatch:
  pull_request:
    # `labeled` declenche sur l'AJOUT de n'importe quel label ; le filtre sur `quality` est fait
    # dans set-mode (un run sans le bon label se termine immediatement, sans build).
    types: [labeled]

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  # Decide si la passe qualite doit tourner : true sur schedule / workflow_dispatch, ou sur une PR
  # portant le label `quality`. Sinon (label autre sur une PR) : run=false -> tous les jobs sont skip.
  set-mode:
    name: mode (run/skip)
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.decide.outputs.run }}
    steps:
      - id: decide
        run: |
          run=false
          if [ "${{ github.event_name }}" = "schedule" ] \
             || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            run=true
          fi
          if [ "${{ github.event_name }}" = "pull_request" ] \
             && [ "${{ contains(github.event.pull_request.labels.*.name, 'quality') }}" = "true" ]; then
            run=true
          fi
          echo "run=$run" >> "$GITHUB_OUTPUT"
          echo "Passe qualite : $run (event=${{ github.event_name }})"

  # --- clang-format : verification de style, sans build ------------------------------------------
  format:
    name: clang-format (style, bloquant)
    runs-on: ubuntu-latest
    needs: set-mode
    if: needs.set-mode.outputs.run == 'true'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
      - name: Install clang-format (version epinglee)
        # Version FIGEE (ADC-381) : le check format est BLOQUANT (ADC-219) et le rendu Google-style de
        # clang-format varie entre versions majeures. apt-get installait la version du runner (~v14-18),
        # d'ou une derive CI/local possible sur un tronc pourtant conforme. On epingle la version du
        # balayage ADC-118 -- 19.1.7, roue PyPI = binaire LLVM officiel -> gate deterministe. pipx est
        # deja utilise par ce job (ruff/gcovr) ; les contributeurs alignent leur clang-format local
        # (cf. .clang-format et CONTRIBUTING.md).
        run: pipx install clang-format==19.1.7
      - name: clang-format --dry-run (bloquant)
        run: |
          echo "$(clang-format --version)"
          mapfile -t files < <(find include python tests -type f \
            \( -name '*.hpp' -o -name '*.h' -o -name '*.cpp' -o -name '*.cc' -o -name '*.cxx' \) | sort)
          bad=0
          : > format-diff.patch
          for f in "${files[@]}"; do
            if ! diff -u "$f" <(clang-format --style=file "$f") >> format-diff.patch; then
              echo "::warning file=$f::clang-format : non conforme au style (.clang-format)"
              bad=$((bad+1))
            fi
          done
          {
            echo "### clang-format"
            echo ""
            echo "- Fichiers analyses : ${#files[@]}"
            echo "- Non conformes : **$bad**"
            echo ""
            echo "_Corriger localement avec_ \`clang-format -i <fichier>\` _ou_ \`git clang-format\`."
          } >> "$GITHUB_STEP_SUMMARY"
          echo "Non conformes : $bad / ${#files[@]}"
          # Bascule ADC-219 (informatif -> bloquant). Le tronc est conforme au style .clang-format
          # depuis le balayage ADC-118, donc tout nouvel ecart est une regression : le job echoue.
          # Les fichiers fautifs sont en ::warning ci-dessus et dans l'artefact format-diff.patch ;
          # corriger avec 'clang-format -i <fichier>' ou 'git clang-format'.
          if [ "$bad" -ne 0 ]; then
            echo "::error::clang-format : $bad fichier(s) non conforme(s) au style (.clang-format) -- job BLOQUANT (bascule ADC-219)"
            exit 1
          fi
      - name: ruff (lint Python, non bloquant)
        if: always()  # le check clang-format precedent peut echouer (bloquant) ; ruff reste informatif
        run: |
          # Config : [tool.ruff] de pyproject.toml. --exit-zero : annotations sans casser le run.
          pipx run ruff check python --output-format github --exit-zero | tee ruff.log
          n=$(grep -c "^::" ruff.log || true)
          {
            echo "### ruff (python/)"
            echo ""
            echo "- Findings : **$n**"
            echo ""
            echo "_Informatif : applique localement avec_ \`ruff check --fix python\`."
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload diff de format
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: clang-format-diff
          path: format-diff.patch
          if-no-files-found: ignore
      - name: Garde racine (allowlist, informatif)
        if: always()
        run: |
          # Avertit si un artefact inattendu apparait a la racine du depot (fichiers traques).
          # La racine ne doit contenir que les configs build/outillage, README/CHANGELOG/
          # LICENSE/CONTRIBUTING/SECURITY et les dotfiles qualite.
          bad=$(git ls-files | grep -vE '/' | grep -iE '\.(csv|log|png|jpe?g|gif|tmp|o|so|dylib|zip|tar|gz|bak)$' || true)
          if [ -n "$bad" ]; then
            echo "::warning::artefact(s) inattendu(s) a la racine (deplacer dans docs/ ou supprimer) :"
            echo "$bad"
          else
            echo "racine propre (aucun artefact a la racine)"
          fi
      - name: Couverture matrice backend (BACKEND_COVERAGE.md, informatif)
        if: always()
        run: |
          # gen_test_counts.py --check-matrix liste les tests disque (tests/test_*.cpp +
          # python/tests/test_*.py) absents de la matrice : elle se veut source unique de
          # couverture, un test sans ligne est un trou (et la derive qui la rend perimee).
          # Non bloquant (set +e) : informatif jusqu'a ce que la matrice soit complete (cf. ADC-258),
          # puis a basculer bloquant (politique ADC-120).
          set +e
          out=$(python3 docs/gen_test_counts.py --check-matrix)
          rc=$?
          set -e
          echo "$out"
          n=$(printf '%s\n' "$out" | grep -c '^MISSING' || true)   # grep -c exit 1 si 0 match -> || true (sinon set -e tue l'etape quand la matrice est complete)
          if [ "$rc" -ne 0 ]; then
            echo "::warning::BACKEND_COVERAGE.md : $n test(s) sans ligne dans la matrice (anti-derive, cf. ADC-258)"
          fi
          {
            echo "### Couverture matrice backend"
            echo ""
            echo "- Tests absents de \`docs/BACKEND_COVERAGE.md\` : **$n**"
            echo ""
            echo "_Informatif : ajouter la ligne du test dans la matrice (cf. ADC-258) ; bloquant une fois complete._"
          } >> "$GITHUB_STEP_SUMMARY"

  # --- Warnings stricts : build avec -Wall -Wextra ... -------------------------------------------
  warnings:
    name: warnings stricts (build, informatif)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: set-mode
    if: needs.set-mode.outputs.run == 'true'
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 500M
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
      - id: kokkos
        uses: ./.github/actions/setup-kokkos
      - name: Cache ccache (quality/warnings)
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-quality-warnings-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-quality-warnings-
            ccache-${{ runner.os }}-kokkos-serial-
      - name: Build avec warnings stricts
        env:
          KOKKOS_PREFIX: ${{ steps.kokkos.outputs.kokkos-prefix }}
        run: |
          echo "::add-matcher::.github/problem-matchers/gcc.json"
          cmake --preset ci-warnings
          # Non bloquant : meme si une cible echouait, on collecte les warnings (le gate ci.yml
          # reste l'autorite sur la compilabilite). Le code retour est ignore (set +e).
          set +e
          cmake --build --preset ci-warnings 2>&1 | tee build-warnings.log
          echo "::remove-matcher owner=adc-gcc-warnings::"
      - name: Resume warnings
        if: always()
        run: |
          n=$(grep -c "warning:" build-warnings.log || true)
          {
            echo "### Warnings compilateur stricts"
            echo ""
            echo "- Occurrences \`warning:\` : **$n**"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload log de build
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: warnings-build-log
          path: build-warnings.log
          if-no-files-found: ignore

  # --- clang-tidy : analyse statique sur les TU de tests/ ----------------------------------------
  tidy:
    name: clang-tidy (analyse statique, informatif)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: set-mode
    if: needs.set-mode.outputs.run == 'true'
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 500M
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
      - id: kokkos
        uses: ./.github/actions/setup-kokkos
        with:
          extra-apt: clang-tidy
      - name: Configure (export compile_commands.json)
        env:
          KOKKOS_PREFIX: ${{ steps.kokkos.outputs.kokkos-prefix }}
        run: cmake --preset ci-kokkos
      - name: run-clang-tidy (non bloquant)
        run: |
          echo "$(clang-tidy --version | head -1)"
          # Nom du wrapper variable selon la version apt (run-clang-tidy / run-clang-tidy-18 ...).
          RCT=$(command -v run-clang-tidy || command -v run-clang-tidy-18 \
                || command -v run-clang-tidy-19 || echo run-clang-tidy)
          echo "wrapper : $RCT"
          # Le HeaderFilter de .clang-tidy limite deja les diagnostics a include/adc/. On analyse les
          # TU de tests/ (elles tirent l'essentiel des en-tetes du coeur). -extra-arg : la DB porte des
          # flags gcc -> on neutralise les options inconnues du frontend clang.
          set +e
          "$RCT" -p build-kokkos -quiet \
            -extra-arg=-Wno-unknown-warning-option -extra-arg=-Wno-unknown-attributes \
            "$(pwd)/tests/.*\.cpp" 2>&1 | tee tidy.log
          n=$(grep -c "warning:" tidy.log || true)
          {
            echo "### clang-tidy"
            echo ""
            echo "- Diagnostics (\`warning:\`) sur les en-tetes du coeur : **$n**"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload rapport clang-tidy
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: clang-tidy-report
          path: tidy.log
          if-no-files-found: ignore

  # --- Sanitizers : ctest sous ASan + UBSan ------------------------------------------------------
  sanitizers:
    name: sanitizers ASan+UBSan (ctest, informatif)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: set-mode
    if: needs.set-mode.outputs.run == 'true'
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 500M
      # Kokkos n'est pas instrumente -> on coupe LSan (singletons Kokkos) et les faux positifs de
      # frontiere instrumente/non instrumente. halt_on_error=0 : on collecte tous les rapports.
      ASAN_OPTIONS: detect_leaks=0:detect_container_overflow=0:abort_on_error=0:halt_on_error=0
      UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=0
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
      - id: kokkos
        uses: ./.github/actions/setup-kokkos
      - name: Cache ccache (quality/asan)
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-quality-asan-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-quality-asan-
      # ASan recent + noyau recent : sans cet ajustement, l'adresse de la shadow memory peut
      # entrer en collision ("Shadow memory range interleaves with an existing memory mapping").
      - name: Detendre l'ASLR (compat ASan)
        run: sudo sysctl vm.mmap_rnd_bits=28 || true
      - name: Build + ctest sous ASan/UBSan (non bloquant)
        env:
          KOKKOS_PREFIX: ${{ steps.kokkos.outputs.kokkos-prefix }}
        run: |
          cmake --preset ci-asan
          cmake --build --preset ci-asan
          set +e
          ctest --preset ci-asan --output-on-failure 2>&1 | tee asan.log
          rc=${PIPESTATUS[0]}
          {
            echo "### Sanitizers (ASan + UBSan)"
            echo ""
            if [ "$rc" -eq 0 ]; then
              echo "- ctest : **vert** sous instrumentation."
            else
              echo "- ctest : **$rc** test(s) en echec / rapport sanitizer (voir l'artefact \`asan-log\`)."
              echo "::warning::sanitizers : au moins un test a signale un probleme sous ASan/UBSan (run informatif, non bloquant)."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload log sanitizers
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: asan-log
          path: asan.log
          if-no-files-found: ignore

  # --- TSan : ctest sous ThreadSanitizer (backend Kokkos OpenMP) ---------------------------------
  # Seul sanitizer du trio (ASan/UBSan/TSan) qui vise l'angle mort des races : le gate ctest tourne en
  # Serial (zero thread -> aucune race possible), alors que le backend on-node de production est OpenMP.
  # Mutuellement exclusif d'ASan -> preset ci-tsan dedie (clang + Kokkos OpenMP, cf. setup-kokkos).
  tsan:
    name: TSan races (ctest OpenMP, informatif)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: set-mode
    if: needs.set-mode.outputs.run == 'true'
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 500M
      # 2 threads suffisent a exposer une race sans subir tout le slowdown TSan (5-15x). Kokkos / libomp
      # sont lies non instrumentes -> races benignes de leurs internes filtrees par tsan-suppressions.txt
      # (chaque entree justifiee). second_deadlock_stack=1 : 2e pile sur deadlock potentiel.
      # halt_on_error=0 : on collecte tous les rapports en un seul run.
      OMP_NUM_THREADS: '2'
      TSAN_OPTIONS: second_deadlock_stack=1:halt_on_error=0:suppressions=${{ github.workspace }}/tsan-suppressions.txt
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
      # Install Kokkos OpenMP compilee en CLANG (cle de cache distincte) : libgomp (gcc) n'est PAS
      # TSan-aware (faux positifs en masse) -> clang + libomp LLVM obligatoire.
      - id: kokkos
        uses: ./.github/actions/setup-kokkos
        with:
          compiler: clang
          exec-space: openmp
          extra-apt: clang
      - name: Cache ccache (quality/tsan)
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-quality-tsan-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-quality-tsan-
      - name: Build + ctest sous TSan (non bloquant)
        env:
          KOKKOS_PREFIX: ${{ steps.kokkos.outputs.kokkos-prefix }}
        run: |
          cmake --preset ci-tsan
          cmake --build --preset ci-tsan
          set +e
          ctest --preset ci-tsan --output-on-failure 2>&1 | tee tsan.log
          rc=${PIPESTATUS[0]}
          {
            echo "### ThreadSanitizer (races, backend OpenMP)"
            echo ""
            if [ "$rc" -eq 0 ]; then
              echo "- ctest : **vert** sous TSan (aucune race hors suppressions)."
            else
              echo "- ctest : **$rc** test(s) / rapport(s) TSan (voir l'artefact \`tsan-log\`)."
              echo "::warning::tsan : au moins un test a signale une race sous TSan (run informatif, non bloquant). Trier signal/bruit avant de conclure (cf. tsan-suppressions.txt)."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload log TSan
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tsan-log
          path: tsan.log
          if-no-files-found: ignore

  # --- Fuzzing libFuzzer : invariants des composants purs du coeur -------------------------------
  fuzz:
    name: fuzzing libFuzzer (90 s/cible, bloquant)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: set-mode
    if: needs.set-mode.outputs.run == 'true'
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 500M
      # Kokkos lie mais non instrumente -> on coupe LSan ; l'UB reste fatal (-fno-sanitize-recover
      # cote build), donc chaque violation produit un artefact crash-* reproductible.
      ASAN_OPTIONS: detect_leaks=0:detect_container_overflow=0
      UBSAN_OPTIONS: print_stacktrace=1
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
      # Install Kokkos compilee en CLANG (cle de cache distincte de celle du gate gcc) : les
      # harnais compilent en clang (libFuzzer), on aligne le Kokkos lie sur le meme compilateur.
      - id: kokkos
        uses: ./.github/actions/setup-kokkos
        with:
          compiler: clang
          extra-apt: clang
      - name: Cache ccache (quality/fuzz)
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-quality-fuzz-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-quality-fuzz-
      - name: Detendre l'ASLR (compat ASan)
        run: sudo sysctl vm.mmap_rnd_bits=28 || true
      - name: Build des harnais (clang, fuzzer+ASan+UBSan)
        env:
          KOKKOS_PREFIX: ${{ steps.kokkos.outputs.kokkos-prefix }}
        run: |
          cmake --preset ci-fuzz
          cmake --build --preset ci-fuzz
      - name: Fuzz (90 s par cible, bloquant)
        run: |
          mkdir -p fuzz-artifacts
          bad=0
          # CMAKE_RUNTIME_OUTPUT_DIRECTORY=bin (CMakeLists racine) : les executables sont dans bin/.
          for t in fuzz_box2d fuzz_cluster fuzz_dense_eig; do
            echo "::group::$t"
            set +e
            ./build-fuzz/bin/"$t" -max_total_time=90 -rss_limit_mb=4096 \
              -artifact_prefix="fuzz-artifacts/$t-" -print_final_stats=1 2>&1 | tail -40
            rc=${PIPESTATUS[0]}
            set -e
            echo "::endgroup::"
            if [ "$rc" -ne 0 ]; then
              echo "::warning::fuzz : $t a trouve un crash / invariant viole (rc=$rc) -- entree fautive dans l'artefact fuzz-crashes"
              bad=$((bad+1))
            fi
          done
          {
            echo "### Fuzzing (libFuzzer, 90 s/cible)"
            echo ""
            echo "- Cibles : fuzz_box2d, fuzz_cluster, fuzz_dense_eig"
            echo "- Cibles avec crash / invariant viole : **$bad**"
          } >> "$GITHUB_STEP_SUMMARY"
          # Bascule ADC-120 (1re bascule informatif -> bloquant). Le fuzz est durci EN PREMIER car un
          # crash / invariant viole est TOUJOURS un bug reel : l'entree minimisee est reproductible
          # (artefact fuzz-crashes), aucun faux positif a trier. Le job echoue donc des qu'une cible
          # remonte un probleme.
          if [ "$bad" -ne 0 ]; then
            echo "::error::fuzz : $bad cible(s) avec crash ou invariant viole -- job BLOQUANT (bascule ADC-120, voir artefact fuzz-crashes)"
            exit 1
          fi
      - name: Upload entrees de crash
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-crashes
          path: fuzz-artifacts/
          if-no-files-found: ignore

  # --- Couverture : ctest instrumente gcov + rapport gcovr ---------------------------------------
  coverage:
    name: couverture gcov (ctest + gcovr, informatif)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: set-mode
    if: needs.set-mode.outputs.run == 'true'
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 500M
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
      - id: kokkos
        uses: ./.github/actions/setup-kokkos
      - name: Cache ccache (quality/coverage)
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-quality-coverage-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-quality-coverage-
      - name: Build + ctest (instrumentes gcov)
        env:
          KOKKOS_PREFIX: ${{ steps.kokkos.outputs.kokkos-prefix }}
        run: |
          cmake --preset ci-coverage
          cmake --build --preset ci-coverage
          # Informatif : la couverture est publiee meme si des tests echouent (le gate ci.yml
          # reste l'autorite sur la correction).
          set +e
          ctest --preset ci-coverage --output-on-failure
          echo "ctest rc=$? (non bloquant ici)"
          set -e
      - name: Rapport gcovr (filtre include/adc/)
        run: |
          mkdir -p coverage-report
          # --gcov-ignore-parse-errors : sans lui, UNE ligne gcov inattendue (vu en vrai sur
          # fab2d.hpp : "Unrecognized GCOV output", exit 64) avorte TOUT le rapport. On degrade
          # en warnings : un fichier mal parse vaut mieux que zero rapport.
          pipx run gcovr --root . build-kokkos-coverage \
            --gcov-ignore-parse-errors=all \
            --filter 'include/adc/' \
            --print-summary \
            --txt coverage-report/coverage.txt \
            --xml coverage-report/coverage.xml \
            --html-details coverage-report/index.html
          {
            echo "### Couverture (gcovr, filtre include/adc/)"
            echo ""
            echo '```'
            tail -30 coverage-report/coverage.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload rapport de couverture
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage-report/
          if-no-files-found: ignore

  # --- CodeQL : code scanning C++ (repo public = gratuit) ----------------------------------------
  codeql:
    name: CodeQL (code scanning C++)
    runs-on: ubuntu-latest
    needs: set-mode
    if: needs.set-mode.outputs.run == 'true'
    # Garde-fou : un futur blocage du build trace echoue vite au lieu de squatter 6 h (defaut GitHub).
    # Le constat ADC-173 : 2 runs annules apres >2h38 sur l'etape de build.
    timeout-minutes: 45
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
      - id: kokkos
        uses: ./.github/actions/setup-kokkos
      - name: Initialise CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: c-cpp
          build-mode: manual
          queries: security-and-quality
          config-file: ./.github/codeql/codeql-config.yml
      # Build OBSERVE par le traceur CodeQL : un SOUS-ENSEMBLE de petites cibles de test a -O0
      # (ADC_TESTS_FAST_O0 du preset), choisi pour couvrir les couches d'en-tetes du coeur
      # (mesh / amr / elliptique / numerics) avec un cout d'extraction BORNE.
      #  - Le cout de l'extracteur C++ de CodeQL est proportionnel aux INSTANCIATIONS de templates
      #    du TU, pas a son -O : les ~140 tests (>2h38, 2 runs annules) comme le module _adc
      #    (3 TU geantes system.cpp/amr_system.cpp qui instancient TOUTES les facades : >45 min,
      #    timeout) sont pathologiques. Les petites cibles ci-dessous instancient chacune une
      #    tranche bornee du coeur -> minutes, pas heures.
      #  - CodeQL analyse un en-tete des qu'il est compile dans UN SEUL TU : la reunion des
      #    tranches couvre l'essentiel de include/adc/ SAUF les facades runtime System/AmrSystem
      #    (instanciees uniquement par les TU geantes) -- trade-off assume, cf. ADC-173.
      #  - ccache OFF (-DADC_USE_CCACHE=OFF) GARDE : un hit ccache court-circuiterait la
      #    compilation et masquerait le TU a l'extracteur.
      - name: Build cible (sous-ensemble leger, trace CodeQL)
        env:
          KOKKOS_PREFIX: ${{ steps.kokkos.outputs.kokkos-prefix }}
        run: |
          cmake --preset ci-kokkos -DADC_USE_CCACHE=OFF
          cmake --build --preset ci-kokkos --target \
            test_box2d test_fab2d test_box_array test_multifab test_reduce \
            test_fill_boundary test_physical_bc test_geometry test_dense_eig \
            test_refinement test_amr_hierarchy test_cluster test_regrid \
            test_flux_register test_coverage_mask test_cf_interface \
            test_poisson_smoother test_geometric_mg test_poisson_fft \
            test_elliptic_operator
      - name: Analyse CodeQL
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:c-cpp"
