name: Docs

# Publie la doc (Sphinx + Doxygen) sur GitHub Pages. Opt-in seulement :
#   - le message de commit contient "[docs]"
#   - ou declenchement manuel (workflow_dispatch)
# Le job installe Sphinx + Doxygen et compile le module Python (~quelques min) ;
# la plupart des commits ne touchent pas la doc, d'ou le marqueur opt-in.
on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[docs]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: System deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libeigen3-dev doxygen graphviz ninja-build

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # numpy est requis a l'import du module (dsl.py fait `import numpy`) et par
      # autodoc ; on l'installe avant de compiler/importer adc.
      - name: Python deps
        run: |
          pip install --upgrade pip
          pip install numpy
          pip install -r docs/sphinx/requirements.txt

      # TOUTES les etapes (lint, module _adc pour autodoc, sphinx -W, doxygen, site combine)
      # vivent dans scripts/build_docs.sh : SOURCE UNIQUE, identique en local et en CI.
      # Le script construit le module via le preset `python` (pin interpreteur de setup-python
      # par Python_ROOT_DIR/PATH ; ninja fourni par apt ci-dessus).
      - name: Build docs (lint + module + sphinx + doxygen)
        run: bash scripts/build_docs.sh

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

  deploy:
    needs: build
    # Ne PUBLIE que depuis master : un workflow_dispatch sur une branche construit et
    # valide la doc (job build) SANS pousser un build non-mergé sur le site Pages live.
    if: ${{ github.ref == 'refs/heads/master' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
