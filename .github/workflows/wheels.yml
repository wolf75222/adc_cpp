# Builds a PREBUILT macOS arm64 / CPython 3.12 wheel of the `_pops` module so end users can
# `pip install adc_cpp-*.whl` in seconds with no local toolchain (the from-source `pip install .`
# recompiles the heavy Kokkos module). The wheel is self-contained: Kokkos is built Serial + STATIC
# + PIC and linked into `_pops.*.so`, and cibuildwheel runs delocate-wheel to bundle any remaining
# dynamic dependency. Kokkos stays ON and mandatory (adc_cpp is Kokkos-only).
#
# Triggers: on a vX.Y.Z tag (attach the wheel to the GitHub Release made by release.yml) and on
# demand (workflow_dispatch). It is SEPARATE from ci.yml's required `gate` (an artifact build, not a
# correctness gate), and deliberately does NOT run on PRs: ci.yml's required gate-python already
# builds `_pops` WITH Kokkos and runs the python suite on every PR, so the only signal unique to this
# job is the packaging path (cibuildwheel + delocate + static-Kokkos link + pyproject). To validate
# that before cutting a release, run this workflow manually (workflow_dispatch) on the candidate.
name: Wheels

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write  # attach the wheel to the Release on a tag (gh release upload); read otherwise

concurrency:
  group: wheels-${{ github.ref }}
  # A tag build ships a release artifact and must not be cancelled; only redundant manual re-runs on
  # the same ref supersede each other (a fresh dispatch cancels a stale one on that ref).
  cancel-in-progress: ${{ github.event_name == 'workflow_dispatch' }}

jobs:
  macos-arm64:
    name: wheel (macOS arm64, cp312)
    runs-on: macos-14  # Apple Silicon (arm64) runner

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install cibuildwheel
        # Pinned (not a floating range): this job ships a redistributable artifact, so its build driver
        # is fixed like ci.yml pins its third-party action by SHA. Bump deliberately.
        run: python -m pip install --upgrade pip "cibuildwheel==2.21.3"

      - name: Install ccache
        run: brew list ccache >/dev/null 2>&1 || brew install ccache

      # Cache the Kokkos install (deterministic for a fixed version + commit + flags), so warm runs SKIP
      # the Serial+static+PIC Kokkos build entirely -- CIBW_BEFORE_ALL no-ops on a cache hit. The key
      # carries the pinned commit (15dc143e = tag 4.4.01) and the build flags, AND hashFiles(this
      # workflow): any edit to a Kokkos flag here rolls the key (no stale-flag reuse) and editing the
      # file is the escape hatch from a bad cache. macos-14 is pinned, and libc++ ABI is stable across
      # its image updates, so the runner SDK is not in the key (an archive built on an older image links
      # fine into a fresh _pops on a newer one).
      - name: Cache Kokkos install (macOS arm64, Serial static PIC)
        id: kokkos-cache
        uses: actions/cache@v5
        with:
          path: /tmp/kokkos-install
          key: kokkos-wheel-macos-arm64-4.4.01-15dc143e-serial-static-pic-cxx20-dt11-${{ hashFiles('.github/workflows/wheels.yml') }}

      # ccache for the heavy -O3 _pops TUs. Rolling key (sha) + restore-keys reuse the most recent cache.
      # cibuildwheel builds in a temp dir, so CCACHE_BASEDIR + CCACHE_NOHASHDIR (set in CIBW_ENVIRONMENT)
      # are what give cross-run hits; the actual warm hit-rate is reported by the `ccache -s` step below.
      - name: Cache ccache (wheel)
        uses: actions/cache@v5
        with:
          path: ~/.cache/pops-wheel-ccache
          key: ccache-wheel-macos-arm64-${{ github.sha }}
          restore-keys: |
            ccache-wheel-macos-arm64-

      # cibuildwheel builds cp312-macosx_arm64 in an isolated env. CIBW_BEFORE_ALL runs ONCE on the
      # runner (macOS builds are native, not containerized), installing a Serial+static+PIC Kokkos that
      # find_package(Kokkos) then links INTO _pops -> the wheel carries no external Kokkos dylib.
      # POPS_HEAVY_TU_POOL=2: post-split (ADC-335/342/359) the heavy module TUs are SMALL sub-TUs, so two
      # -O3 compiles fit the ~7 GB / 3-vCPU runner; the original pool=1 OOM guard (for the old monolithic
      # system.cpp / amr_system.cpp) made the serial build ~1 h here. MACOSX_DEPLOYMENT_TARGET=11.0 keeps
      # the wheel installable on older macOS than the runner SDK.
      - name: Build wheel (cibuildwheel)
        env:
          CIBW_BUILD: cp312-macosx_arm64
          CIBW_ARCHS_MACOS: arm64
          CIBW_CONFIG_SETTINGS: cmake.define.POPS_HEAVY_TU_POOL=2
          MACOSX_DEPLOYMENT_TARGET: '11.0'
          # Builds Kokkos ONLY on a cache miss (the install dir is restored above otherwise). The clone
          # is retried (a transient network blip must not waste a multi-hour build) and its checkout is
          # asserted against the pinned commit of tag 4.4.01 (detects a re-pointed tag -- supply chain).
          # -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 is explicit so Kokkos targets 11.0 regardless of env
          # inheritance, matching the _pops target (no static-archive min-version skew).
          CIBW_BEFORE_ALL: |
            set -e
            if [ ! -f /tmp/kokkos-install/lib/cmake/Kokkos/KokkosConfig.cmake ]; then
              for i in 1 2 3; do
                git clone --depth 1 -b 4.4.01 https://github.com/kokkos/kokkos.git /tmp/kokkos && break
                echo "kokkos clone failed (attempt $i/3), retrying..."; rm -rf /tmp/kokkos; sleep 10
              done
              test "$(git -C /tmp/kokkos rev-parse HEAD)" = "15dc143e5f39949eece972a798e175c4b463d4b8"
              cmake -S /tmp/kokkos -B /tmp/kbuild \
                -DKokkos_ENABLE_SERIAL=ON \
                -DBUILD_SHARED_LIBS=OFF \
                -DCMAKE_INSTALL_PREFIX=/tmp/kokkos-install \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_CXX_STANDARD=20 \
                -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
                -DCMAKE_POSITION_INDEPENDENT_CODE=ON
              cmake --build /tmp/kbuild --target install -j3
            fi
            test -f /tmp/kokkos-install/lib/cmake/Kokkos/KokkosConfig.cmake
          # ccache wraps the heavy -O3 _pops compiles. COMPILERCHECK=content keys on the compiler binary
          # (not its mtime); MAXSIZE bounds the cached dir so it cannot crowd out the Kokkos cache under
          # the repo's 10 GB budget. CAVEAT: cibuildwheel builds under a per-run temp dir, so the absolute
          # source/-I paths vary run-to-run and CCACHE_BASEDIR cannot fully normalise them -- cross-run
          # hits may be low. The `ccache -s` step measures it; if it stays ~0, the real lever is a
          # persistent scikit-build-core build-dir (deferred, see ADC-367). The Kokkos-install cache above
          # is the reliable win regardless.
          CIBW_ENVIRONMENT: >
            Kokkos_ROOT=/tmp/kokkos-install
            CMAKE_PREFIX_PATH=/tmp/kokkos-install
            MACOSX_DEPLOYMENT_TARGET=11.0
            CMAKE_CXX_COMPILER_LAUNCHER=ccache
            CCACHE_DIR=$HOME/.cache/pops-wheel-ccache
            CCACHE_BASEDIR=$HOME
            CCACHE_MAXSIZE=2G
            CCACHE_NOHASHDIR=1
            CCACHE_COMPILERCHECK=content
            CCACHE_SLOPPINESS=time_macros,include_file_mtime,include_file_ctime,pch_defines
          # Smoke-test the built wheel in cibuildwheel's isolated venv: it must import self-contained
          # (this is the real self-containment check; doctor() is skipped here as the bare venv has no
          # compiler/Kokkos and would print noisy but harmless FAIL lines).
          CIBW_TEST_COMMAND: 'python -c "import pops; print(pops.__version__)"'
        run: python -m cibuildwheel --output-dir wheelhouse

      - name: ccache stats (wheel)
        if: always()
        # Surfaces the warm-run hit-rate. If it stays near zero across runs, cibuildwheel's per-build
        # temp source path is defeating CCACHE_BASEDIR -> the next lever is a persistent scikit-build-core
        # build-dir cache (deferred: higher cross-runner cmake-cache risk).
        run: CCACHE_DIR="$HOME/.cache/pops-wheel-ccache" ccache -s

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: pops-macos-arm64-cp312
          path: wheelhouse/*.whl
          if-no-files-found: error

      # On a vX.Y.Z tag, attach the wheel to the Release. release.yml (a separate workflow on the same
      # tag) is the sole creator of the Release from CHANGELOG.md; both start together, so wait for it
      # to exist before uploading rather than racing it (the long wheel build makes this near-certain,
      # the poll is insurance). We do NOT create the Release here, to keep release.yml's CHANGELOG notes.
      - name: Attach wheel to the Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for i in $(seq 1 15); do
            if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then break; fi
            echo "waiting for release $GITHUB_REF_NAME (attempt $i/15)..."; sleep 20
          done
          # Best-effort: if release.yml has not created the Release (e.g. it errored), do NOT fail the
          # job -- the wheel is already saved as a build artifact. A red wheels job here would falsely
          # read as a wheel-build failure rather than a release-creation problem.
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" wheelhouse/*.whl --repo "$GITHUB_REPOSITORY" --clobber
          else
            echo "::warning::Release $GITHUB_REF_NAME not found after wait; wheel retained as artifact, not attached."
          fi
