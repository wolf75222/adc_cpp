# Environnement pixi d'adc_cpp -- alternative REPRODUCTIBLE a environment.yml.
#
# pixi (https://pixi.sh) resout les memes paquets conda-forge mais :
#   - genere un LOCKFILE multi-plateforme (pixi.lock) a committer : tout le monde a exactement
#     les memes versions (environment.yml ne fige rien, les canaux derivent) ;
#   - stocke l'env DANS le projet (.pixi/, deja sous build*/.gitignore ? non : .pixi/ ajoute) --
#     precieux sur cluster ou ~/.conda explose les quotas $HOME ;
#   - sait faire des dependances PAR PLATEFORME : cxx-compiler (gcc 14) sur Linux uniquement,
#     la ou environment.yml ne sait pas (sur macOS, AppleClang reste la reference, cf.
#     scripts/setup_env.sh et le hint du configure).
#
# Demarrage :
#   curl -fsSL https://pixi.sh/install.sh | bash    # une fois (sans root)
#   pixi install                                    # resout + genere/honore pixi.lock
#   pixi run build-py                               # taches ci-dessous
# Au PREMIER `pixi install`, committer le pixi.lock genere.
#
# environment.yml reste la voie conda classique (setup_env.sh) ; les deux listes doivent rester
# alignees (memes paquets de base).

[project]
name = "adc-cpp-env"
description = "Outillage de build et backends CPU locaux d'adc_cpp"
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64", "linux-aarch64"]

[dependencies]
python = "3.12.*"
cmake = ">=3.27"
ninja = "*"
ccache = "*"
numpy = ">=1.24"
pybind11 = ">=2.13"
kokkos = "*"        # Serial-only sur conda-forge ; multi-thread reel : pixi run kokkos-openmp
openmpi = "*"
llvm-openmp = "*"

# Toolchain C++23 par plateforme : gcc conda sur Linux (active CC/CXX a l'activation) ;
# sur macOS on garde AppleClang (le clang conda est un LLVM vanilla, mesure >15x plus lent
# sur les TU du module ; cf. hint du configure).
[target.linux-64.dependencies]
cxx-compiler = "*"

[target.linux-aarch64.dependencies]
cxx-compiler = "*"

[tasks]
# Module Python serie, installe dans l'env pixi (sans PYTHONPATH).
build-py = "pip install ."
# Module parallele : Kokkos OpenMP requis (tache kokkos-openmp d'abord si le kokkos conda est Serial).
build-py-kokkos = { cmd = "pip install . -v", env = { POPS_USE_KOKKOS = "ON", Kokkos_ROOT = "$CONDA_PREFIX" } }
# Kokkos Serial+OpenMP compile dans l'env (~2 min) -- comble le kokkos conda Serial-only.
kokkos-openmp = "bash scripts/kokkos_openmp_conda.sh"
# Coeur + tests C++ (presets ; l'env pixi expose CONDA_PREFIX comme conda).
test = "cmake --preset serial && cmake --build --preset serial && ctest --preset serial"
docs = "bash scripts/build_docs.sh"
doctor = "python -c 'import adc; pops.doctor()'"
